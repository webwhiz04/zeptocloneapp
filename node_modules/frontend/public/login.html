<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #faf6f6;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .container {
            margin-top: 200px;
            width: 850px;
            height: 450px;
            background: #faf6f6;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 10px 30px #3f3e3e;
            margin-left: 350px;
        }

        .leftside {
            flex: 1;
            background: linear-gradient(.25turn, rgb(219, 4, 243), 20%, rgb(204, 118, 219));
            color: #fff;
            padding: 50px 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: large;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 22px;
            font-weight: normal;
            margin-bottom: 20px;

        }

        input[type="text"] {
            color: #fff;
            border-radius: 20px;
            padding: 10px 20px;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #ff4f8b;
            border: none;
            border-radius: 20px;
            padding: 10px;
            color: #faf6f6;
            font-size: medium;
            margin-bottom: 40px;
            cursor: pointer;
            transition: 0.4s;

        }

        .btn:hover {
            background: #ff2e74;
        }

        .con {
            align-items: center;
        }

        .rightside {
            flex: 1;
            background: linear-gradient(.25turn, rgb(192, 144, 198), 20%, rgb(253, 251, 253));
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .phone {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .lh2 {
            text-align: center;
            font-size: 30px;
            color: #9500ff;
            font-weight: bold;
        }

        p {
            text-align: center;
            font-weight: bold;
        }

        .store-btn {
            width: 180px;
            margin: 10px 0;
            padding: 20px;

        }

        .store-btn img {
            width: 100%;
            cursor: pointer;
        }

        .img {
            width: 200px;
            height: auto;
            margin-left: 50px;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <div class="container">
            <div class="leftside">
                <div class="logo">
                    <img
                        src="https://cdn.zeptonow.com/web-static-assets-prod/artifacts/14.11.1/tr:w-0.2,ar-0.2-0.2,pr-true,f-auto,q-40/images/logo.svg">
                </div>
                <h2>Lowest price Everyday</h2>
                <h2> in minutes</h2>
                <input type="text" placeholder="+91 enter the number">
                <button class="btn">Continue</button>
                <p class="con">
                    by continuing, you agree to our <br>Terms of Services and Privacy Policy
                </p>
            </div>
            <div class="rightside">
                <div class="phone">
                    <img
                        src="https://cdn.zeptonow.com/web-static-assets-prod/artifacts/14.11.1/tr:w-100,ar-100-100,pr-true,f-auto,q-40/images/get-the-app/get-the-app-phone.png">
                </div>
                <h2 class="lh2">Order faster &<br> easier <br>every time</h2>
                <p>with zepto app</p>
                <div class="appbtn">
                    <img src=" https://cdn.zeptonow.com/web-static-assets-prod/artifacts/14.11.1/tr:w-180,ar-180-46,pr-true,f-auto,q-40/images/app-stores/download-play-store.svg"
                        class="img">
                </div>
                <div class="appbtn">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ0eOmm8lR_dgM2e5hko5IWEPgFeG5HtLYU1A&s" class="img">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
